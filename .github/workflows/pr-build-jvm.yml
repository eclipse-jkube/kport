name: "[PR] Build JVM on Linux"
on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize]
jobs:
  build:
    name: Build on Linux (JVM)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build All (JVM)
        run: |
          mvn clean install -DskipTests
