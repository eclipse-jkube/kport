name: "[PR] Build native binaries"
on:
  issue_comment:
    types: [created]
jobs:
  notify-start:
    name: Notify build start
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    if: ${{ github.event.issue.pull_request != null && (contains(github.event.comment.body, '/build-native-linux') || contains(github.event.comment.body, '/build-native-mac') || contains(github.event.comment.body, '/build-native-windows')) }}
    outputs:
      comment_id: ${{ steps.post-comment.outputs.comment_id }}
    steps:
      - name: Post starting comment
        id: post-comment
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const commentBody = context.payload.comment.body;
            const platforms = [];
            if (commentBody.includes('/build-native-linux')) platforms.push('Linux');
            if (commentBody.includes('/build-native-mac')) platforms.push('macOS');
            if (commentBody.includes('/build-native-windows')) platforms.push('Windows');
            const platformStr = platforms.join(', ');
            const marker = '<!-- kport-native-build-comment -->';
            const body = `${marker}\n## 🚀 Native build starting\n\nBuilding native binaries for: **${platformStr}**\n\n⏳ Build in progress... [View job →](${runUrl})`;
            const { data: comment } = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
            core.setOutput('comment_id', comment.id);

  build-linux:
    name: Build kubectl-kport and kport-ide-server native binaries on Linux
    runs-on: ubuntu-latest
    needs: notify-start
    permissions:
      contents: read
    if: ${{ github.event.issue.pull_request != null && contains(github.event.comment.body, '/build-native-linux') }}
    steps:
      - name: Get PR head SHA
        id: pr-info
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('sha', pr.data.head.sha);

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr-info.outputs.sha }}
          path: kport

      - uses: actions/checkout@v4
        with:
          repository: quarkiverse/quarkus-sshd
          path: quarkus-sshd

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '24'
          distribution: 'graalvm-community'
          github-token: ${{ github.token }}
          native-image-job-reports: 'false'

      - name: Build quarkus-sshd (SNAPSHOT)
        working-directory: quarkus-sshd
        run: |
          mvn install -DskipTests

      - name: Build All on Linux
        working-directory: kport
        run: |
          mvn clean install -DskipTests -Dnative

      - name: Upload kubectl-kport
        uses: actions/upload-artifact@v4
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          name: kubectl-kport-Linux
          path: kport/kubectl-kport/target/kubectl-kport
          retention-days: 1

      - name: Upload kport-ide-server
        uses: actions/upload-artifact@v4
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          name: kport-ide-server-Linux
          path: kport/kport-ide-server/target/kport-ide-server
          retention-days: 1

  build-mac:
    name: Build kubectl-kport and kport-ide-server native binaries on macOS
    runs-on: macos-latest
    needs: notify-start
    permissions:
      contents: read
    if: ${{ github.event.issue.pull_request != null && contains(github.event.comment.body, '/build-native-mac') }}
    steps:
      - name: Get PR head SHA
        id: pr-info
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('sha', pr.data.head.sha);

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr-info.outputs.sha }}
          path: kport

      - uses: actions/checkout@v4
        with:
          repository: quarkiverse/quarkus-sshd
          path: quarkus-sshd

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '24'
          distribution: 'graalvm-community'
          github-token: ${{ github.token }}
          native-image-job-reports: 'false'

      - name: Build quarkus-sshd (SNAPSHOT)
        working-directory: quarkus-sshd
        run: |
          mvn install -DskipTests

      - name: Build All on macOS
        working-directory: kport
        run: |
          mvn clean install -DskipTests -Dnative

      - name: Upload kubectl-kport
        uses: actions/upload-artifact@v4
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          name: kubectl-kport-macOS
          path: kport/kubectl-kport/target/kubectl-kport
          retention-days: 1

      - name: Upload kport-ide-server
        uses: actions/upload-artifact@v4
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          name: kport-ide-server-macOS
          path: kport/kport-ide-server/target/kport-ide-server
          retention-days: 1

  build-windows:
    name: Build kubectl-kport and kport-ide-server native binaries on Windows
    runs-on: windows-latest
    needs: notify-start
    permissions:
      contents: read
    if: ${{ github.event.issue.pull_request != null && contains(github.event.comment.body, '/build-native-windows') }}
    steps:
      - name: Get PR head SHA
        id: pr-info
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('sha', pr.data.head.sha);

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr-info.outputs.sha }}
          path: kport

      - uses: actions/checkout@v4
        with:
          repository: quarkiverse/quarkus-sshd
          path: quarkus-sshd

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '24'
          distribution: 'graalvm-community'
          github-token: ${{ github.token }}
          native-image-job-reports: 'false'

      - name: Build quarkus-sshd (SNAPSHOT)
        working-directory: quarkus-sshd
        run: |
          mvn install -DskipTests

      - name: Build All on Windows
        working-directory: kport
        run: |
          mvn clean install -DskipTests -Dnative

      - name: Upload kubectl-kport
        uses: actions/upload-artifact@v4
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          name: kubectl-kport-Windows.exe
          path: kport/kubectl-kport/target/kubectl-kport.exe
          retention-days: 1

      - name: Upload kport-ide-server
        uses: actions/upload-artifact@v4
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          name: kport-ide-server-Windows.exe
          path: kport/kport-ide-server/target/kport-ide-server.exe
          retention-days: 1

  comment:
    name: Update build status comment
    runs-on: ubuntu-latest
    needs: [notify-start, build-linux, build-mac, build-windows]
    if: ${{ always() && needs.notify-start.result == 'success' }}
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Update comment with build results
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const commentId = ${{ needs.notify-start.outputs.comment_id }};
            const linuxResult = '${{ needs.build-linux.result }}';
            const macResult = '${{ needs.build-mac.result }}';
            const windowsResult = '${{ needs.build-windows.result }}';

            const marker = '<!-- kport-native-build-comment -->';
            const lines = ['## 🏁 Native build results\n'];

            if (linuxResult !== 'skipped') {
              const icon = linuxResult === 'success' ? '✅' : '❌';
              lines.push(`${icon} **Linux**: ${linuxResult}`);
            }
            if (macResult !== 'skipped') {
              const icon = macResult === 'success' ? '✅' : '❌';
              lines.push(`${icon} **macOS**: ${macResult}`);
            }
            if (windowsResult !== 'skipped') {
              const icon = windowsResult === 'success' ? '✅' : '❌';
              lines.push(`${icon} **Windows**: ${windowsResult}`);
            }

            const anySuccess = [linuxResult, macResult, windowsResult]
              .some(r => r === 'success');

            if (anySuccess) {
              lines.push(`\n➡️ [Download artifacts from this Actions run](${runUrl})\n\nArtifacts expire after 1 day.`);
            } else {
              lines.push(`\n🔍 [View job logs](${runUrl})`);
            }

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: commentId,
              body: `${marker}\n${lines.join('\n')}`,
            });

