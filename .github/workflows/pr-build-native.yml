name: "[PR] Build native binaries"
on:
  issue_comment:
    types: [created]
jobs:
  build-linux:
    name: Build kubectl-kport and kport-ide-server native binaries on Linux
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: ${{ github.event.issue.pull_request != null && contains(github.event.comment.body, '/build-native-linux') }}
    steps:
      - name: Get PR head SHA
        id: pr-info
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('sha', pr.data.head.sha);

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr-info.outputs.sha }}
          path: kport

      - uses: actions/checkout@v4
        with:
          repository: quarkiverse/quarkus-sshd
          path: quarkus-sshd

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '24'
          distribution: 'graalvm-community'
          github-token: ${{ github.token }}
          native-image-job-reports: 'false'

      - name: Build quarkus-sshd (SNAPSHOT)
        working-directory: quarkus-sshd
        run: |
          mvn install -DskipTests

      - name: Build All on Linux
        working-directory: kport
        run: |
          mvn clean install -DskipTests -Dnative

      - name: Upload kubectl-kport
        uses: actions/upload-artifact@v4
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          name: kubectl-kport-Linux
          path: kport/kubectl-kport/target/kubectl-kport
          retention-days: 1

      - name: Upload kport-ide-server
        uses: actions/upload-artifact@v4
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          name: kport-ide-server-Linux
          path: kport/kport-ide-server/target/kport-ide-server
          retention-days: 1

  build-mac:
    name: Build kubectl-kport and kport-ide-server native binaries on macOS
    runs-on: macos-latest
    permissions:
      contents: read
    if: ${{ github.event.issue.pull_request != null && contains(github.event.comment.body, '/build-native-mac') }}
    steps:
      - name: Get PR head SHA
        id: pr-info
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('sha', pr.data.head.sha);

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr-info.outputs.sha }}
          path: kport

      - uses: actions/checkout@v4
        with:
          repository: quarkiverse/quarkus-sshd
          path: quarkus-sshd

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '24'
          distribution: 'graalvm-community'
          github-token: ${{ github.token }}
          native-image-job-reports: 'false'

      - name: Build quarkus-sshd (SNAPSHOT)
        working-directory: quarkus-sshd
        run: |
          mvn install -DskipTests

      - name: Build All on macOS
        working-directory: kport
        run: |
          mvn clean install -DskipTests -Dnative

      - name: Upload kubectl-kport
        uses: actions/upload-artifact@v4
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          name: kubectl-kport-macOS
          path: kport/kubectl-kport/target/kubectl-kport
          retention-days: 1

      - name: Upload kport-ide-server
        uses: actions/upload-artifact@v4
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          name: kport-ide-server-macOS
          path: kport/kport-ide-server/target/kport-ide-server
          retention-days: 1

  build-windows:
    name: Build kubectl-kport and kport-ide-server native binaries on Windows
    runs-on: windows-latest
    permissions:
      contents: read
    if: ${{ github.event.issue.pull_request != null && contains(github.event.comment.body, '/build-native-windows') }}
    steps:
      - name: Get PR head SHA
        id: pr-info
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            core.setOutput('sha', pr.data.head.sha);

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr-info.outputs.sha }}
          path: kport

      - uses: actions/checkout@v4
        with:
          repository: quarkiverse/quarkus-sshd
          path: quarkus-sshd

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '24'
          distribution: 'graalvm-community'
          github-token: ${{ github.token }}
          native-image-job-reports: 'false'

      - name: Build quarkus-sshd (SNAPSHOT)
        working-directory: quarkus-sshd
        run: |
          mvn install -DskipTests

      - name: Build All on Windows
        working-directory: kport
        run: |
          mvn clean install -DskipTests -Dnative

      - name: Upload kubectl-kport
        uses: actions/upload-artifact@v4
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          name: kubectl-kport-Windows.exe
          path: kport/kubectl-kport/target/kubectl-kport.exe
          retention-days: 1

      - name: Upload kport-ide-server
        uses: actions/upload-artifact@v4
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          name: kport-ide-server-Windows.exe
          path: kport/kport-ide-server/target/kport-ide-server.exe
          retention-days: 1

  comment:
    name: Post artifact links comment on PR
    runs-on: ubuntu-latest
    needs: [build-linux, build-mac, build-windows]
    if: ${{ always() && (needs.build-linux.result != 'skipped' || needs.build-mac.result != 'skipped' || needs.build-windows.result != 'skipped') }}
    permissions:
      pull-requests: write
    steps:
      - name: Comment on PR with artifact links
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `## 📦 Native binaries available\n\nThe native binaries for this PR have been built and are available for download:\n\n➡️ [Download artifacts from this Actions run](${runUrl})\n\nArtifacts expire after 1 day.`;
            const marker = '<!-- kport-artifact-comment -->';
            const markedBody = `${marker}\n${body}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: markedBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: markedBody,
              });
            }

